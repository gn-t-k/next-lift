name: Merge Master

on:
  workflow_run:
    workflows: ["PR Push check"]
    types: [completed]
  pull_request:
    types: [auto_merge_enabled]
  push:
    branches: [main]

concurrency:
  group: merge-master

jobs:
  merge-master:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: get-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: praha-inc/merge-master@3b6060c932d815dccb297ab05907fddd06ae02fa # v1.2.0
        with:
          github-token: ${{ steps.get-app-token.outputs.token }}
