name: PR Push check

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.check.outputs.code }}
    permissions:
      pull-requests: read
    steps:
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          code_changes="false"
          while IFS= read -r file; do
            case "$file" in
              docs/*|*.md|.claude/*) ;;
              *) code_changes="true"; break ;;
            esac
          done <<< "$files"
          echo "code=$code_changes" >> "$GITHUB_OUTPUT"

  build-and-type-check:
    name: Build and Type check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Pull Vercel Environment
        run: |
          npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          # CIビルド確認用のAPP_ENV（実際のデプロイはsetup-preview.ymlで設定）
          export APP_ENV="development-ci"
          pnpm run build

      - name: Type check
        run: pnpm run type-check

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Lint
        run: pnpm run lint
