name: Document Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  document-review:
    # Renovateによる依存関係更新PR、Bot起因のイベント、フォークPRを除外
    if: >-
      ${{
        !startsWith(github.head_ref, 'deps/') &&
        github.actor != 'claude[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Collect review context
        run: bash .github/scripts/collect-review-context.sh

      - uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "next-lift-merge-master"
          track_progress: true
          use_sticky_comment: true
          prompt: |
            このPRの変更内容を分析し、ドキュメント更新漏れがないかチェックしてください。

            ## 変更されたファイル一覧

            ```
            ${{ env.REVIEW_CHANGED_FILES }}
            ```

            ## 差分

            `Read` ツールで `${{ env.REVIEW_DIFF_PATH }}` のファイルを読み、差分を確認してください。

            ## 関連ドキュメント

            `Read` ツールで `${{ env.REVIEW_DOCS_PATH }}` のファイルを読み、関連ドキュメントを確認してください。

            ## チェック対象ドキュメント

            以下のドキュメントが変更内容と整合しているか確認してください：

            1. **CLAUDE.md** - 開発プロセス、ルール、プロジェクト構造の変更時
            2. **.claude/rules/*.md** - コーディング規約、テストルール、エラー処理ルールの変更時
            3. **docs/architecture-decision-record/*.md** - アーキテクチャ、技術スタック、設計パターンの変更時
            4. **docs/project/overview.md** - 機能追加、開発計画の変更時
            5. **各パッケージのREADME.md/CLAUDE.md** - パッケージ固有の変更時

            ## レビュー方針

            - 変更されたコードに対応するドキュメント更新が含まれているか確認
            - 更新が必要だが含まれていない場合は、具体的に何を更新すべきか提案
            - 軽微な変更（typo修正、リファクタリング）でドキュメント更新不要な場合は「更新不要」と明示
            - 新しいADRが必要な場合は、その旨を提案

            ## 出力形式

            以下の形式でレビュー結果をまとめてください：
            - ✅ 更新済み: ドキュメントが適切に更新されている項目
            - ⚠️ 要確認: 更新が必要かもしれない項目（理由と提案を含む）
            - ❌ 更新漏れ: 明らかに更新が必要な項目（具体的な更新内容を提案）

            ドキュメントの読み取りとレビューのみを行い、コードの編集・コミット・プッシュは一切行わないでください。
          claude_args: |
            --max-turns 10
